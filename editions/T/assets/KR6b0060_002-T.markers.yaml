      兔自燒身供養大仙緣

      善惡獼猴緣

      佛以智水滅三【CB】【麗-CB】，四【大】三K30n1001_p0179c06T04n0203_p0455a03Q四火緣

      波羅㮈國有一長者子共天神感王行孝緣

      迦尸國王白香象養盲父母并和二國緣

      波羅㮈國弟微諫兄遂徹承相勸王孝化天下緣

      梵摩達夫人妬忌傷子法護緣

      駝驃比丘被謗緣

      離越被謗緣

      波斯匿王醜女賴提緣

      波斯匿王女善光緣

      昔王子兄弟二人被驅出國緣

      須達長者婦供養佛獲報緣

      娑羅那比丘為惡生王所苦惱緣

      內官贖所犍牛得男根緣

      兩內官共諍道理緣', 宋: '', 元: '', 明: ''}
